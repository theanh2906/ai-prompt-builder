name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'
    branches-ignore:
      - 'gh-pages'
permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine base path
        id: base
        run: |
          # Sanitize branch name once for reuse in base path and destination dir
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH="$(printf '%s' "$BRANCH" | sed -E 's#[^A-Za-z0-9._-]+#-#g')"
          [ -n "$SAFE_BRANCH" ] || SAFE_BRANCH="preview"
          echo "safe_branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          if [ "$BRANCH" = "main" ]; then
            echo "path=/ai-prompt-builder/" >> $GITHUB_OUTPUT
          else
            echo "path=/ai-prompt-builder/preview/${SAFE_BRANCH}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy main branch
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # keep_files preserves preview/* subdirectories when redeploying main
          keep_files: true

      - name: Deploy preview to subdirectory
        if: github.ref_name != 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/${{ steps.base.outputs.safe_branch }}
          keep_files: true
